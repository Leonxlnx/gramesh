<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>AuraMesh Pro | Gradient Studio</title>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="styles.css">
</head>

<body>
    <div class="app">
        <aside class="sidebar">
            <div class="header">
                <div class="logo-icon">
                    <svg width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"
                        stroke-linecap="round" stroke-linejoin="round">
                        <circle cx="12" cy="12" r="10"></circle>
                        <path d="M12 2a14.5 14.5 0 0 0 0 20 14.5 14.5 0 0 0 0-20"></path>
                        <path d="M2 12h20"></path>
                    </svg>
                </div>
                <h1>AuraMesh Pro</h1>
            </div>

            <div class="content">
                <!-- Playback Mode -->
                <div class="control">
                    <label>Playback</label>
                    <div class="segmented" id="playback-tabs">
                        <button class="active" data-playback="video">Video</button>
                        <button data-playback="still">Static</button>
                    </div>
                </div>

                <!-- Render Mode -->
                <div class="control">
                    <label>Render Mode</label>
                    <div class="segmented" id="mode-tabs">
                        <button class="active" data-mode="fluid">Fluid</button>
                        <button data-mode="orbit">Orbit</button>
                        <button data-mode="aurora">Aurora</button>
                    </div>
                </div>

                <!-- Blend Mode (Custom Dropdown) -->
                <div class="control">
                    <label>Blend Mode</label>
                    <div class="custom-dropdown" id="blend-dropdown">
                        <div class="dropdown-trigger" id="blend-trigger">
                            <span>Screen (Vibrant Glow)</span>
                            <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5"
                                stroke-linecap="round" stroke-linejoin="round">
                                <polyline points="6 9 12 15 18 9"></polyline>
                            </svg>
                        </div>
                        <div class="dropdown-menu" id="blend-menu">
                            <div class="dropdown-option selected" data-value="screen">Screen (Vibrant Glow)</div>
                            <div class="dropdown-option" data-value="source-over">Normal (Smooth Overlap)</div>
                        </div>
                    </div>
                </div>

                <!-- Color Palette -->
                <div class="control">
                    <div class="control-head">
                        <label>Color Palette</label>
                        <button id="btn-random" class="icon-btn" title="Randomize Palette">
                            <svg width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor"
                                stroke-width="2">
                                <polyline points="16 3 21 3 21 8"></polyline>
                                <line x1="4" y1="20" x2="21" y2="3"></line>
                                <polyline points="21 16 21 21 16 21"></polyline>
                                <line x1="15" y1="15" x2="21" y2="21"></line>
                                <line x1="4" y1="4" x2="9" y2="9"></line>
                            </svg>
                        </button>
                    </div>
                    <div class="color-grid" id="colors"></div>
                    <div class="color-actions">
                        <button id="btn-add">Add Color</button>
                        <button id="btn-remove">Remove</button>
                    </div>
                </div>

                <!-- Animation Speed -->
                <div class="control" id="speed-control">
                    <div class="control-head">
                        <label>Animation Speed</label>
                        <span id="speed-val">1.0x</span>
                    </div>
                    <input type="range" id="speed" min="0" max="3" step="0.1" value="1.0">
                </div>

                <!-- Gradient Size -->
                <div class="control">
                    <div class="control-head">
                        <label>Gradient Size</label>
                        <span id="spread-val">120%</span>
                    </div>
                    <input type="range" id="spread" min="0.3" max="2.5" step="0.05" value="1.2">
                </div>

                <!-- Dither Texture -->
                <div class="control">
                    <div class="control-head">
                        <label>Dither Texture</label>
                        <span id="grain-val">Off</span>
                    </div>
                    <input type="range" id="grain" min="0" max="0.25" step="0.01" value="0">
                </div>

                <!-- Motion Range -->
                <div class="control" id="motion-control">
                    <div class="control-head">
                        <label>Motion Range</label>
                        <span id="motion-val">100%</span>
                    </div>
                    <input type="range" id="motion" min="0.1" max="2.0" step="0.05" value="1.0">
                </div>
            </div>

            <!-- Export Footer -->
            <div class="footer">
                <div class="control">
                    <label>Export Format</label>
                    <div class="custom-dropdown" id="format-dropdown">
                        <div class="dropdown-trigger" id="format-trigger">
                            <span>PNG Image</span>
                            <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5"
                                stroke-linecap="round" stroke-linejoin="round">
                                <polyline points="6 9 12 15 18 9"></polyline>
                            </svg>
                        </div>
                        <div class="dropdown-menu" id="format-menu">
                            <div class="dropdown-option selected" data-value="png">PNG Image</div>
                            <div class="dropdown-option" data-value="webm">WebM Video</div>
                        </div>
                    </div>
                </div>
                <button class="btn btn-primary" id="btn-export">
                    <svg width="15" height="15" fill="none" stroke="currentColor" stroke-width="2"
                        stroke-linecap="round" stroke-linejoin="round" viewBox="0 0 24 24">
                        <path d="M21 15v4a2 2 0 0 1-2 2H5a2 2 0 0 1-2-2v-4"></path>
                        <polyline points="7 10 12 15 17 10"></polyline>
                        <line x1="12" y1="15" x2="12" y2="3"></line>
                    </svg>
                    Download
                </button>
            </div>
        </aside>

        <!-- Preview -->
        <main class="preview">
            <div class="canvas-wrapper" id="canvas-wrapper">
                <canvas id="canvas"></canvas>
                <div id="node-handles"></div>
                <div id="rec-overlay" class="rec-overlay">
                    <div class="spinner"></div>
                    <span style="font-weight:500;letter-spacing:0.05em;">Recording...
                        <span id="rec-time">0</span>s</span>
                </div>
                <div class="mode-badge" id="mode-badge">Video</div>
                <div class="size-badge">640 × 480</div>
            </div>
        </main>
    </div>

    <script src="app.js"></script>
</body>

</html>
